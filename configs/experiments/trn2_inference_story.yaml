device: trainium
dtype: fp32
seed: 123
warmup_iters: 1
measure_iters: 5
distributed: true
dual_world_size: 2
setups:
  - single_die
  - dual_die_tensor_optimized
  - dual_die_request_sharded

enable_fabric_calibration: true
fabric_message_sizes:
  - 1024
  - 4096
  - 16384
  - 65536
  - 262144
  - 1048576
fabric_warmup_iters: 2
fabric_measure_iters: 8

enforce_correctness: true
correctness_abs_tol: 0.005
correctness_rel_tol: 0.02

# Dual-die-aware attention knobs:
# - reduce_group_k lowers collective count by merging multiple K tiles locally.
tensor_attention_tile_q: 64
tensor_attention_tile_k: 128
tensor_attention_reduce_group_k: 8
tensor_attention_pipelined_prefill: false
tensor_attention_pipelined_decode: false
tensor_attention_naive_threshold: 0

prefill:
  - batch: 4
    seq_len: 2048
    model_dim: 1024
    num_heads: 16
    mlp_ratio: 4
  - batch: 4
    seq_len: 4096
    model_dim: 1024
    num_heads: 16
    mlp_ratio: 4
  - batch: 4
    seq_len: 8192
    model_dim: 1024
    num_heads: 16
    mlp_ratio: 4

decode:
  - concurrency: 8
    context_len: 2048
    decode_steps: 16
    model_dim: 1024
    num_heads: 16
    mlp_ratio: 4
  - concurrency: 16
    context_len: 2048
    decode_steps: 16
    model_dim: 1024
    num_heads: 16
    mlp_ratio: 4
  - concurrency: 32
    context_len: 2048
    decode_steps: 16
    model_dim: 1024
    num_heads: 16
    mlp_ratio: 4
  - concurrency: 8
    context_len: 4096
    decode_steps: 16
    model_dim: 1024
    num_heads: 16
    mlp_ratio: 4
  - concurrency: 16
    context_len: 4096
    decode_steps: 16
    model_dim: 1024
    num_heads: 16
    mlp_ratio: 4
  - concurrency: 32
    context_len: 4096
    decode_steps: 16
    model_dim: 1024
    num_heads: 16
    mlp_ratio: 4
  - concurrency: 8
    context_len: 8192
    decode_steps: 16
    model_dim: 1024
    num_heads: 16
    mlp_ratio: 4
  - concurrency: 16
    context_len: 8192
    decode_steps: 16
    model_dim: 1024
    num_heads: 16
    mlp_ratio: 4

decode_slo_ms:
  - 250.0
  - 500.0
  - 1000.0
  - 2000.0
  - 4000.0
