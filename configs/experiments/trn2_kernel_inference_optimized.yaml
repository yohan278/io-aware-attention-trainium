device: trainium
dtype: fp32
warmup_iters: 1
measure_iters: 4
seed: 123
distributed: true
dual_world_size: 2
causal_attention: false
enable_fabric_calibration: true
fabric_message_sizes: [1024, 4096, 16384, 65536, 262144, 1048576]
fabric_warmup_iters: 2
fabric_measure_iters: 8

enforce_correctness: true
correctness_abs_tol: 0.005
correctness_rel_tol: 0.02

# Grouped distributed-merge attention to reduce collective count.
attention_pipelined: false
attention_tile_q: 64
attention_tile_k: 128
attention_reduce_group_k: 8

kernels:
  - qkv_proj
  - attention
  - mlp
  - rmsnorm
  - out_proj

setups:
  - single_die
  - single_die_native
  - dual_die_naive
  - dual_die_optimized

shapes:
  - batch: 1
    seq_len: 512
    model_dim: 1024
    num_heads: 16
    mlp_ratio: 4
  - batch: 1
    seq_len: 1024
    model_dim: 1024
    num_heads: 16
    mlp_ratio: 4
