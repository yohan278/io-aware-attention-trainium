device: cpu
dtype: fp32
seed: 0
warmup_iters: 0
measure_iters: 1
distributed: false
dual_world_size: 2
setups:
  - single_die
decode:
  - concurrency: 2
    context_len: 256
    decode_steps: 2
    model_dim: 32
    hidden_dim: 64
    num_experts: 4
    top_k: 2
