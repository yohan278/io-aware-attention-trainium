device: trainium
dtype: fp32
seed: 42
warmup_iters: 1
measure_iters: 4
distributed: true
dual_world_size: 2
setups:
  - single_die
  - dual_die_moe_naive
  - dual_die_moe_locality
decode:
  - concurrency: 8
    context_len: 2048
    decode_steps: 8
    model_dim: 1024
    hidden_dim: 4096
    num_experts: 8
    top_k: 2
    routing_skew: 0.0
  - concurrency: 16
    context_len: 2048
    decode_steps: 8
    model_dim: 1024
    hidden_dim: 4096
    num_experts: 8
    top_k: 2
    routing_skew: 0.0
  - concurrency: 8
    context_len: 4096
    decode_steps: 8
    model_dim: 1024
    hidden_dim: 4096
    num_experts: 8
    top_k: 2
    routing_skew: 0.0
  - concurrency: 16
    context_len: 4096
    decode_steps: 8
    model_dim: 1024
    hidden_dim: 4096
    num_experts: 8
    top_k: 2
    routing_skew: 0.0
  - concurrency: 8
    context_len: 2048
    decode_steps: 8
    model_dim: 1024
    hidden_dim: 4096
    num_experts: 8
    top_k: 2
    routing_skew: 1.8
  - concurrency: 16
    context_len: 2048
    decode_steps: 8
    model_dim: 1024
    hidden_dim: 4096
    num_experts: 8
    top_k: 2
    routing_skew: 1.8
  - concurrency: 8
    context_len: 4096
    decode_steps: 8
    model_dim: 1024
    hidden_dim: 4096
    num_experts: 8
    top_k: 2
    routing_skew: 1.8
  - concurrency: 16
    context_len: 4096
    decode_steps: 8
    model_dim: 1024
    hidden_dim: 4096
    num_experts: 8
    top_k: 2
    routing_skew: 1.8
decode_slo_ms: [75, 100, 150, 250, 500, 1000]
capacity_slo_ms: 250.0
continue_on_runtime_error: true
record_runtime_failures: true
enable_fabric_calibration: true
fabric_message_sizes: [1024, 4096, 16384, 65536, 262144]
fabric_warmup_iters: 1
fabric_measure_iters: 4
enforce_correctness: true
correctness_abs_tol: 0.02
correctness_rel_tol: 0.025
