name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: ioattn-trn2
          auto-activate-base: false
          environment-file: conda/environment.cpu.yml
          python-version: "3.10"

      - name: Install project
        shell: bash -el {0}
        run: |
          python -m pip install -e .

      - name: Ruff
        shell: bash -el {0}
        run: ruff check .

      - name: Unit tests
        shell: bash -el {0}
        run: pytest -q

      - name: CPU smoke benchmark
        shell: bash -el {0}
        run: |
          python scripts/run_bench.py \
            --config configs/benchmark/smoke.yaml \
            --variant naive \
            --device cpu \
            --output-dir results/ci-smoke
